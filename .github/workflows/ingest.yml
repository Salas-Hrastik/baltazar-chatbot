name: Ingestija Obsidian Vaulta

on:
  # Automatski pokretanje svaki put kad se pusha u main (Obsidian Git sync)
  push:
    branches: [main]
    paths:
      - "**.md"          # Samo ako su se promijenile .md datoteke

  # Ručno pokretanje iz GitHub Actions sučelja
  workflow_dispatch:
    inputs:
      force_reingest:
        description: "Prisili ponovnu ingestiju svih dokumenata"
        required: false
        default: "false"

jobs:
  ingest:
    name: Reingestija u Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repozitorija
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Dohvati zadnja 2 commita (za diff)

      - name: Provjeri promijenjene .md datoteke
        id: changed_files
        run: |
          if [ "${{ github.event.inputs.force_reingest }}" == "true" ]; then
            echo "force=true" >> $GITHUB_OUTPUT
            echo "🔄 Prisilna reingestija svih datoteka"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- "*.md" | grep -v "^.obsidian/" || true)
            if [ -z "$CHANGED" ]; then
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "ℹ️  Nema promjena u .md datotekama, preskačem ingestiju"
            else
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "📝 Promijenjene datoteke:"
              echo "$CHANGED"
            fi
          fi

      - name: Pokretanje ingestije
        if: steps.changed_files.outputs.has_changes == 'true' || steps.changed_files.outputs.force == 'true'
        run: |
          echo "🚀 Pokrećem ingestiju..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.VERCEL_APP_URL }}/api/ingest")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "📊 Odgovor servera: $BODY"
          echo "📡 HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Ingestija neuspješna s HTTP $HTTP_CODE"
            exit 1
          fi

          echo "✅ Ingestija uspješna!"

      - name: Preskači ingestiju (nema promjena)
        if: steps.changed_files.outputs.has_changes == 'false' && steps.changed_files.outputs.force != 'true'
        run: echo "⏭️ Preskačem ingestiju — nema novih .md datoteka"
